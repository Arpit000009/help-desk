server:
  port: 8081

spring:
  application:
    name: help-desk-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/your_database_name
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true